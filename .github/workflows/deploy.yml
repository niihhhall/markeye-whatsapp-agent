name: Deploy to DigitalOcean
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          debug: true
          script: |
            # Ensure directory exists and clone if necessary
            if [ ! -d "~/markeye-whatsapp-agent" ]; then
              git clone https://github.com/niihhhall/markeye-whatsapp-agent.git ~/markeye-whatsapp-agent
            fi
            
            cd ~/markeye-whatsapp-agent
            git fetch origin main
            git reset --hard origin/main
            
            # Restart services
            docker compose down
            docker compose up -d --build
            
            # Cleanup unused resources to prevent disk filling
            docker system prune -f
