version: '3.8'
services:
  fastapi:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        reservations:
          memory: 256M

  openwa:
    image: ghcr.io/rmyndharis/openwa:latest
    ports:
      - "2785:2785"
    env_file:
      - .env
    environment:
      - API_MASTER_KEY=${OPENWA_API_KEY:-markeye_openwa_key}
      - ENGINE_TYPE=whatsapp-web.js
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_TYPE=sqlite
      - DATABASE_URL=sqlite:///app/data/openwa.db
      - WEBHOOK_SSRF_PROTECT=false
    volumes:
      - openwa_data:/app/data
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  openwa_data:

