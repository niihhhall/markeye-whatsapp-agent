version: '3.8'
services:
  fastapi:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        reservations:
          memory: 256M

  baileys:
    build: ./baileys-service
    env_file:
      - .env
    volumes:
      - baileys_sessions:/app/sessions
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          cpus: '0.4'
          memory: 384M

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  baileys_sessions:
